<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 主背景圆 -->
  <circle cx="64" cy="64" r="58" fill="url(#mainGradient)" stroke="white" stroke-width="2" filter="url(#glow)"/>
  
  <!-- 内层光环 -->
  <circle cx="64" cy="64" r="45" fill="none" stroke="white" stroke-width="1" opacity="0.6"/>
  
  <!-- 播放三角形 - 电影核心元素 -->
  <path d="M48 40 L48 88 L88 64 Z" fill="white"/>
  
  <!-- AI网格点阵 -->
  <g fill="url(#accentGradient)">
    <!-- 第一列 -->
    <circle cx="32" cy="32" r="4" opacity="0.9"/>
    <circle cx="32" cy="56" r="4" opacity="0.9"/>
    <circle cx="32" cy="80" r="4" opacity="0.9"/>
    <circle cx="32" cy="104" r="4" opacity="0.9"/>
    
    <!-- 第二列 -->
    <circle cx="56" cy="32" r="4" opacity="0.9"/>
    <circle cx="56" cy="104" r="4" opacity="0.9"/>
    
    <!-- 第三列 -->
    <circle cx="80" cy="32" r="4" opacity="0.9"/>
    <circle cx="80" cy="104" r="4" opacity="0.9"/>
    
    <!-- 第四列 -->
    <circle cx="104" cy="32" r="4" opacity="0.9"/>
    <circle cx="104" cy="56" r="4" opacity="0.9"/>
    <circle cx="104" cy="80" r="4" opacity="0.9"/>
    <circle cx="104" cy="104" r="4" opacity="0.9"/>
  </g>
  
  <!-- 连接线 -->
  <g stroke="white" stroke-width="1" opacity="0.4">
    <line x1="32" y1="32" x2="104" y2="32"/>
    <line x1="32" y1="56" x2="56" y2="56"/>
    <line x1="80" y1="56" x2="104" y2="56"/>
    <line x1="32" y1="80" x2="56" y2="80"/>
    <line x1="80" y1="80" x2="104" y2="80"/>
    <line x1="32" y1="104" x2="104" y2="104"/>
    
    <line x1="32" y1="32" x2="32" y2="104"/>
    <line x1="56" y1="32" x2="56" y2="56"/>
    <line x1="56" y1="80" x2="56" y2="104"/>
    <line x1="80" y1="32" x2="80" y2="56"/>
    <line x1="80" y1="80" x2="80" y2="104"/>
    <line x1="104" y1="32" x2="104" y2="104"/>
  </g>
  
  <!-- 高光效果 -->
  <circle cx="64" cy="64" r="50" fill="none" stroke="white" stroke-width="0.5" opacity="0.3"/>
  <circle cx="45" cy="45" r="8" fill="white" opacity="0.2"/>
</svg>